<!DOCTYPE html>
<html lang="zh-CN" data-theme="theme-purple">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模型性价比追踪</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  /* 引入朱雀仿宋字体 */
  @font-face {
      font-family: 'ZhuqueFangsong';
      src: url("https://files.catbox.moe/138mza.ttf") format('truetype');
      font-weight: 300;
      font-style: normal;
  }

  /* =========================================
     🎨 极致柔化 rgba 主题系统 (Opacity: 0.5~0.7)
  ========================================== */

  /* 1. 🔮 原生紫 (Fluid Purple - 柔化版) */
  :root, [data-theme="theme-purple"] {
    --font-sans: 'Sora', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --bg-base: #f6f4fa; /* 更淡的底色 */
    --bg-glow: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(192,132,252,0.15) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 80%, rgba(56,189,248,0.12) 0%, transparent 55%), radial-gradient(ellipse 50% 60% at 60% 20%, rgba(249,115,22,0.08) 0%, transparent 50%), radial-gradient(ellipse 70% 40% at 10% 80%, rgba(167,139,250,0.1) 0%, transparent 60%);
    --glass-bg: rgba(255,255,255,0.5);
    --glass-border: rgba(255,255,255,0.7);
    --glass-blur: blur(22px) saturate(180%);
    --card-shadow: 0 2px 18px rgba(80,60,120,0.04), inset 0 1px 0 rgba(255,255,255,0.5);
    --card-shadow-hover: 0 6px 28px rgba(80,60,120,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
    --input-focus: 0 0 0 3px rgba(192,132,252,0.1);
    
    /* 核心点：全部使用 rgba(..., 0.6) 级别柔化 */
    --accent-1: rgba(150, 80, 220, 0.6);
    --accent-2: rgba(240, 110, 30, 0.5);
    --text-main: rgba(30, 25, 45, 0.7);
    --text-soft: rgba(30, 25, 45, 0.45);
    --text-muted: rgba(30, 25, 45, 0.25);
    --border-line: rgba(168,159,192,0.15);
    
    --radius-lg: 20px;
    --radius-sm: 12px;

    --rank1-bg: rgba(255,214,0,0.15); --rank1-border: rgba(255,214,0,0.3); --rank1-color: rgba(180,80,0,0.6);
    --rank2-bg: rgba(148,163,184,0.15); --rank2-border: rgba(148,163,184,0.3); --rank2-color: rgba(70,80,100,0.6);
    --rank3-bg: rgba(180,120,80,0.15); --rank3-border: rgba(180,120,80,0.3); --rank3-color: rgba(140,60,10,0.6);

    /* 侧边渠道色彩：全部 0.5 透明度，绝不刺眼 */
    --ch0: rgba(168, 85, 247, 0.5); --ch1: rgba(59, 130, 246, 0.5); --ch2: rgba(249, 115, 22, 0.5); 
    --ch3: rgba(16, 185, 129, 0.5); --ch4: rgba(232, 121, 249, 0.5); --ch5: rgba(245, 158, 11, 0.5); 
    --ch6: rgba(6, 182, 212, 0.5); --ch7: rgba(239, 68, 68, 0.5); --ch8: rgba(132, 204, 22, 0.5); 
    --ch9: rgba(139, 92, 246, 0.5);
  }

  /* 2. ❄️ 冰霜蓝 (SaaS Frost Blue - 柔化版) */
  [data-theme="theme-blue"] {
    --bg-base: #f4f6f8;
    --bg-glow: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(96, 165, 250, 0.1) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 80%, rgba(167, 139, 250, 0.08) 0%, transparent 55%);
    --glass-bg: rgba(255, 255, 255, 0.6);
    --glass-border: rgba(255, 255, 255, 0.7);
    --glass-blur: blur(22px) saturate(180%);
    --card-shadow: 0 2px 16px rgba(30, 41, 59, 0.03), inset 0 1px 0 rgba(255, 255, 255, 0.8);
    --card-shadow-hover: 0 6px 24px rgba(30, 41, 59, 0.06), inset 0 1px 0 rgba(255, 255, 255, 1);
    --input-focus: 0 0 0 3px rgba(96, 165, 250, 0.1);
    
    --accent-1: rgba(60, 130, 240, 0.55);
    --accent-2: rgba(130, 90, 240, 0.5);
    --text-main: rgba(30, 40, 60, 0.7);
    --text-soft: rgba(30, 40, 60, 0.45);
    --text-muted: rgba(30, 40, 60, 0.25);
    --border-line: rgba(148, 163, 184, 0.15);
    
    --rank1-bg: rgba(250, 200, 20, 0.15); --rank1-border: rgba(250, 204, 21, 0.2); --rank1-color: rgba(200, 140, 0, 0.6);
    --rank2-bg: rgba(150, 160, 180, 0.15); --rank2-border: rgba(148, 163, 184, 0.2); --rank2-color: rgba(100, 110, 130, 0.6);
    --rank3-bg: rgba(250, 150, 60, 0.15); --rank3-border: rgba(251, 146, 60, 0.2); --rank3-color: rgba(200, 90, 10, 0.6);

    --ch0: rgba(96, 165, 250, 0.55); --ch1: rgba(129, 140, 248, 0.55); --ch2: rgba(52, 211, 153, 0.55); 
    --ch3: rgba(167, 139, 250, 0.55); --ch4: rgba(244, 114, 182, 0.55); --ch5: rgba(56, 189, 248, 0.55); 
    --ch6: rgba(251, 146, 60, 0.55); --ch7: rgba(45, 212, 191, 0.55); --ch8: rgba(248, 113, 113, 0.55); 
    --ch9: rgba(148, 163, 184, 0.55);
  }

  /* 3. 🥐 奶油黄 (Retro Cream - 柔化版) */
  [data-theme="theme-cream"] {
    --bg-base: #f9f8f5;
    --bg-glow: radial-gradient(circle at 15% 20%, rgba(251, 191, 36, 0.08), transparent 40vw), radial-gradient(circle at 85% 80%, rgba(230, 57, 70, 0.05), transparent 40vw);
    --glass-bg: rgba(255, 253, 248, 0.6);
    --glass-border: rgba(230, 222, 210, 0.5);
    --glass-blur: blur(20px) saturate(180%);
    --card-shadow: 0 4px 16px rgba(140, 130, 120, 0.04);
    --card-shadow-hover: 0 8px 24px rgba(140, 130, 120, 0.08);
    --input-focus: 0 0 0 3px rgba(245, 158, 11, 0.1);
    
    --accent-1: rgba(230, 140, 10, 0.6);
    --accent-2: rgba(220, 50, 60, 0.5);
    --text-main: rgba(70, 60, 50, 0.75);
    --text-soft: rgba(70, 60, 50, 0.45);
    --text-muted: rgba(70, 60, 50, 0.25);
    --border-line: rgba(230, 222, 210, 0.4);
    
    --rank1-bg: rgba(250, 220, 100, 0.2); --rank1-border: rgba(250, 220, 100, 0.4); --rank1-color: rgba(200, 120, 10, 0.6);
    --rank2-bg: rgba(220, 225, 230, 0.4); --rank2-border: rgba(220, 225, 230, 0.6); --rank2-color: rgba(100, 110, 130, 0.6);
    --rank3-bg: rgba(255, 210, 170, 0.3); --rank3-border: rgba(255, 210, 170, 0.5); --rank3-color: rgba(200, 90, 10, 0.6);

    --ch0: rgba(230, 57, 70, 0.5); --ch1: rgba(245, 158, 11, 0.5); --ch2: rgba(249, 115, 22, 0.5); 
    --ch3: rgba(16, 185, 129, 0.5); --ch4: rgba(234, 179, 8, 0.5); --ch5: rgba(244, 63, 94, 0.5); 
    --ch6: rgba(132, 204, 22, 0.5); --ch7: rgba(168, 162, 158, 0.5); --ch8: rgba(251, 146, 60, 0.5); 
    --ch9: rgba(253, 164, 175, 0.5);
  }

  /* 4. 📜 仿宋墨 (Watercolored Ink - 完美解决黑框大红的刺眼感) */
  [data-theme="theme-brutal"] {
    --font-sans: 'ZhuqueFangsong', serif;
    --font-mono: 'Courier New', monospace;
    --bg-base: #f0f0f0;
    --bg-glow: none;
    --glass-bg: rgba(255, 255, 255, 0.7);
    --glass-border: rgba(0, 0, 0, 0.15); /* 半透明水墨边框，代替死黑 */
    --glass-blur: none;
    --card-shadow: 2px 2px 6px rgba(0,0,0,0.05);
    --card-shadow-hover: 2px 2px 10px rgba(0,0,0,0.1);
    --input-focus: 0 0 0 2px rgba(0, 0, 0, 0.1);
    
    --accent-1: rgba(200, 30, 50, 0.55); /* 褪色印泥红 */
    --accent-2: rgba(200, 150, 20, 0.55); /* 褪色描金 */
    --text-main: rgba(0, 0, 0, 0.65); /* 浓墨灰，不刺眼 */
    --text-soft: rgba(0, 0, 0, 0.4);
    --text-muted: rgba(0, 0, 0, 0.25);
    --border-line: rgba(0, 0, 0, 0.08);
    
    --radius-lg: 8px; /* 宣纸般的微柔折角 */
    --radius-sm: 6px;

    --rank1-bg: rgba(200, 30, 50, 0.1); --rank1-border: rgba(200, 30, 50, 0.2); --rank1-color: rgba(200, 30, 50, 0.6);
    --rank2-bg: rgba(200, 150, 20, 0.1); --rank2-border: rgba(200, 150, 20, 0.2); --rank2-color: rgba(200, 150, 20, 0.6);
    --rank3-bg: rgba(0, 0, 0, 0.05); --rank3-border: rgba(0, 0, 0, 0.1); --rank3-color: rgba(0, 0, 0, 0.5);

    --ch0: rgba(200, 30, 50, 0.5); --ch1: rgba(200, 150, 20, 0.5); --ch2: rgba(0, 120, 200, 0.5); 
    --ch3: rgba(0, 0, 0, 0.5); --ch4: rgba(80, 80, 80, 0.5); --ch5: rgba(130, 130, 130, 0.5); 
    --ch6: rgba(180, 0, 0, 0.5); --ch7: rgba(200, 180, 0, 0.5); --ch8: rgba(0, 80, 180, 0.5); 
    --ch9: rgba(50, 50, 50, 0.5);
  }

  /* =========================================
     🌟 基础结构与样式
  ========================================== */

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--bg-base);
    min-height: 100vh;
    color: var(--text-main);
    transition: background 0.4s, color 0.4s;
    font-weight: 300;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background: var(--bg-glow); z-index: 0; pointer-events: none; transition: opacity 0.4s;
  }

  .container { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; padding: 40px 16px 80px; }

  /* 主题切换按钮 */
  .theme-toggle-wrap { position: absolute; top: 36px; right: 16px; z-index: 10; }
  .btn-theme {
    display: flex; align-items: center; gap: 6px;
    background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border); border-radius: 999px;
    padding: 6px 14px; font-family: var(--font-sans); font-size: 11px; font-weight: 600;
    color: var(--text-main); cursor: pointer; transition: all 0.3s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  }
  .btn-theme:hover { background: rgba(255,255,255,0.8); transform: translateY(-1px); box-shadow: var(--card-shadow); }

  /* ── Header ── */
  header { margin-bottom: 28px; animation: fadeUp 0.5s ease both; padding-top: 10px; }

  .header-pill {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 999px; padding: 4px 13px; font-size: 10.5px; font-weight: 600;
    color: var(--text-main); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 10px;
    backdrop-filter: var(--glass-blur);
  }

  h1 { font-size: clamp(24px, 5vw, 32px); font-weight: 600; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 5px; }
  h1 span {
    /* 渐变文字也会受 rgba 影响变得轻柔 */
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { font-size: 13px; color: var(--text-soft); font-weight: 400; }

  /* ── Collapsible form ── */
  .form-wrapper { margin-bottom: 14px; animation: fadeUp 0.5s 0.06s ease both; }

  .form-toggle-btn {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; background: var(--glass-bg);
    backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
    cursor: pointer; transition: all 0.3s; box-shadow: var(--card-shadow);
  }
  .form-toggle-btn:hover { background: rgba(255,255,255,0.7); }
  .form-wrapper.open .form-toggle-btn { border-radius: var(--radius-lg) var(--radius-lg) 0 0; border-bottom-color: transparent; }

  .form-toggle-label { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: var(--text-main); }
  .form-toggle-label .plus-icon {
    width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    display: flex; align-items: center; justify-content: center; 
    color: rgba(255, 255, 255, 0.95); font-size: 16px; line-height: 1; transition: transform 0.3s;
    text-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }
  [data-theme="theme-brutal"] .form-toggle-label .plus-icon { border-radius: 4px; }
  .form-wrapper.open .plus-icon { transform: rotate(45deg); }
  .form-toggle-right { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

  .form-body {
    max-height: 0; overflow: hidden;
    /* 彻底隐藏底部白线 */
    opacity: 0; visibility: hidden; box-shadow: none; border-color: transparent;
    transition: max-height 0.36s ease, opacity 0.2s, visibility 0.36s;
    background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border); border-top: none;
    border-radius: 0 0 var(--radius-lg) var(--radius-lg);
  }

  .form-wrapper.open .form-body { 
    max-height: 420px; opacity: 1; visibility: visible; 
    box-shadow: var(--card-shadow); border-color: var(--glass-border);
    transition: max-height 0.36s ease, opacity 0.4s, visibility 0s;
  }

  .form-inner { padding: 18px 20px 20px; }
  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field-wrap { display: flex; flex-direction: column; gap: 6px; }
  .field-wrap label { font-size: 10px; font-weight: 600; color: var(--text-soft); letter-spacing: 0.05em; text-transform: uppercase; padding-left: 2px; }

  input {
    background: rgba(255,255,255,0.4); border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm); padding: 10px 12px; font-family: var(--font-sans);
    font-size: 13px; color: var(--text-main); outline: none; transition: all 0.2s; width: 100%;
    backdrop-filter: blur(8px); font-weight: 300;
  }
  [data-theme="theme-brutal"] input { background: rgba(255,255,255,0.7); }
  input::placeholder { color: var(--text-muted); font-size: 12px; font-weight: 300; }
  input:focus { background: rgba(255,255,255,0.9); border-color: var(--accent-1); box-shadow: var(--input-focus); }
  
  .hint { font-size: 10px; color: var(--text-muted); padding-left: 2px; font-style: italic; }
  .full-col { grid-column: 1 / -1; }

  .btn-add {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
    border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
    color: rgba(255, 255, 255, 0.95); font-family: var(--font-sans); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em; text-shadow: 0 1px 2px rgba(0,0,0,0.1);
  }
  .btn-add:hover { transform: translateY(-1px); filter: brightness(1.05); }
  .btn-add:active { transform: translateY(0); }

  /* ── Toolbar ── */
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding: 0 4px; animation: fadeUp 0.5s 0.12s ease both; }
  .entry-count { font-size: 13px; color: var(--text-muted); font-family: var(--font-mono); }
  .entry-count strong { color: var(--text-main); font-weight: 600; }

  .btn-sort {
    display: flex; align-items: center; gap: 6px; padding: 7px 14px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    border-radius: 999px; font-family: var(--font-sans); font-size: 12px; font-weight: 600;
    color: var(--text-soft); cursor: pointer; transition: all 0.2s; backdrop-filter: var(--glass-blur);
  }
  .btn-sort:hover, .btn-sort.active { background: rgba(255,255,255,0.7); color: var(--accent-1); border-color: var(--accent-1); }
  [data-theme="theme-brutal"] .btn-sort { border-radius: var(--radius-sm); }

  /* ── Cards ── */
  .cards-list { display: flex; flex-direction: column; gap: 12px; }

  .model-card {
    background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
    box-shadow: var(--card-shadow); overflow: hidden; transition: box-shadow 0.2s, transform 0.2s;
    animation: fadeUp 0.35s ease both; cursor: pointer; border-left-width: 4px;
  }
  .model-card:hover { box-shadow: var(--card-shadow-hover); transform: translateY(-2px); }

  .card-main { display: flex; align-items: center; gap: 14px; padding: 16px; user-select: none; }
  
  .card-rank { 
    width: 28px; height: 28px; border-radius: 50%; background: var(--glass-bg); 
    border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; 
    font-size: 12px; font-weight: 600; color: var(--text-muted); flex-shrink: 0; font-family: var(--font-mono); 
  }
  [data-theme="theme-brutal"] .card-rank { border-radius: 4px; }
  
  .card-rank.r1 { background: var(--rank1-bg); border-color: var(--rank1-border); color: var(--rank1-color); }
  .card-rank.r2 { background: var(--rank2-bg); border-color: var(--rank2-border); color: var(--rank2-color); }
  .card-rank.r3 { background: var(--rank3-bg); border-color: var(--rank3-border); color: var(--rank3-color); }

  .card-info { flex: 1; min-width: 0; }
  .card-source-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  
  /* 左侧源点和边框也因为 rgba 变成柔和的半透明色 */
  .ch-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  [data-theme="theme-brutal"] .ch-dot { border-radius: 2px; border: 1px solid rgba(0,0,0,0.2); }
  .card-source { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  
  .card-model { font-family: var(--font-mono); font-size: 14px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600;}
  .card-note { font-size: 12px; color: var(--text-muted); font-style: italic; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  .card-value { text-align: right; flex-shrink: 0; }
  .cost-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 4px; }
  .cost-num { font-family: var(--font-mono); font-size: 20px; font-weight: 500; line-height: 1; }
  .cost-sub { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-family: var(--font-mono); }
  
  /* rgba 叠加出的高级马卡龙色价格字 */
  .c-best .cost-num { color: var(--accent-1); font-weight: 600; }
  .c-good .cost-num { color: var(--accent-2); }
  .c-mid  .cost-num { color: var(--text-soft); }
  .c-low  .cost-num { color: var(--text-muted); }

  .chevron { margin-left: 8px; color: var(--text-muted); transition: transform 0.3s; flex-shrink: 0; }
  .model-card.open .chevron { transform: rotate(180deg); color: var(--accent-1); }

  /* ── Expanded detail ── */
  .card-detail { max-height: 0; overflow: hidden; transition: max-height 0.32s ease; }
  .model-card.open .card-detail { max-height: 360px; }
  .detail-view { border-top: 1px solid var(--border-line); padding: 16px; background: rgba(255,255,255,0.2); }
  [data-theme="theme-brutal"] .detail-view { background: rgba(255,255,255,0.5); }

  /* Grid 解决对齐问题 */
  .detail-row { display: grid; grid-template-columns: 1fr 1fr 1.3fr; gap: 0; }
  .detail-col { display: flex; flex-direction: column; }
  .detail-col:nth-child(2), .detail-col:nth-child(3) { border-left: 1px solid var(--border-line); padding-left: 16px; margin-left: 16px; }

  .detail-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-soft); margin-bottom: 6px; }
  .detail-val { font-family: var(--font-mono); font-size: 15px; color: var(--text-main); }
  .detail-val small { font-size: 11px; color: var(--text-muted); margin-left: 4px; }
  .detail-sub-lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-style: italic; }

  /* calculator */
  .calc-wrap { display: flex; align-items: center; background: rgba(255,255,255,0.5); border: 1px solid var(--glass-border); border-radius: 8px; padding: 0 10px; margin-top: 4px; transition: all 0.2s; }
  .calc-wrap:focus-within { border-color: var(--accent-1); box-shadow: var(--input-focus); background: rgba(255,255,255,0.8); }
  .calc-prefix { font-family: var(--font-mono); font-size: 14px; color: var(--text-muted); margin-right: 4px; flex-shrink: 0;}
  .calc-input { background: transparent !important; border: none !important; border-radius: 0 !important; padding: 8px 0 !important; font-size: 14px; width: 80px; box-shadow: none !important; color: var(--text-main); font-weight: 500;}
  .calc-input:focus { background: transparent !important; box-shadow: none !important; border-color: transparent !important; }
  
  .calc-result { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-top: 6px; min-height: 16px; }
  .calc-result.hit { color: var(--accent-1); font-weight: 600; }

  /* action bar */
  .detail-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--border-line); }
  .btn-edit, .btn-del { display: flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 999px; font-size: 11.5px; font-family: var(--font-sans); font-weight: 600; cursor: pointer; transition: all 0.2s; }
  [data-theme="theme-brutal"] .btn-edit, [data-theme="theme-brutal"] .btn-del { border-radius: 4px; }
  
  .btn-edit { border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-main); }
  .btn-edit:hover { background: rgba(255,255,255,0.7); color: var(--accent-1); border-color: var(--accent-1); }
  .btn-del { border: 1px solid transparent; background: rgba(239, 68, 68, 0.1); color: rgba(200, 50, 50, 0.8); margin-left: auto; }
  .btn-del:hover { background: rgba(239, 68, 68, 0.2); }
  [data-theme="theme-brutal"] .btn-del { background: rgba(0,0,0,0.05); color: var(--text-main); }
  [data-theme="theme-brutal"] .btn-del:hover { background: var(--accent-1); color: #fff; }

  /* ── Edit mode (inline) ── */
  .detail-edit { border-top: 1px solid var(--border-line); padding: 16px; background: rgba(255,255,255,0.3); }
  .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .edit-field { display: flex; flex-direction: column; gap: 4px; }
  .edit-field label { font-size: 10px; font-weight: 600; color: var(--text-soft); letter-spacing: 0.05em; text-transform: uppercase; padding-left: 2px; }
  .edit-field input { padding: 8px 10px; font-size: 12px; }
  .edit-actions { display: flex; gap: 10px; }
  .btn-save { flex: 1; padding: 10px; background: linear-gradient(135deg, var(--accent-1), var(--accent-2)); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); color: rgba(255,255,255,0.95); font-family: var(--font-sans); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-save:hover { filter: brightness(1.05); }
  .btn-cancel { padding: 10px 20px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); color: var(--text-soft); font-family: var(--font-sans); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-cancel:hover { background: rgba(255,255,255,0.7); color: var(--text-main); }

  /* 没有乱七八糟的滤镜 */
  .empty-state { text-align: center; padding: 60px 24px; animation: fadeUp 0.5s 0.18s ease both; display: none; }
  .empty-icon { font-size: 42px; margin-bottom: 12px; line-height: 1; filter: none; opacity: 0.8; }
  .empty-text { font-size: 14px; color: var(--text-muted); font-weight: 400; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

  /* 移动端排版适配（Grid 完美对齐） */
  @media (max-width: 480px) {
    .fields-grid, .edit-grid { grid-template-columns: 1fr; }
    .model-card.open .card-detail { max-height: 480px; }
    .detail-row { grid-template-columns: 1fr 1fr; gap: 0; }
    .detail-col.calc-col { grid-column: 1 / -1; }
    .detail-col:nth-child(2) { margin-left: 12px; padding-left: 12px; }
    .detail-col:nth-child(3) { border-left: none; margin-left: 0; padding-left: 0; border-top: 1px solid var(--border-line); margin-top: 14px; padding-top: 14px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- 🎨 一键切换主题按钮 -->
  <div class="theme-toggle-wrap">
    <button class="btn-theme" onclick="toggleTheme()" title="切换柔化样式">
      <span id="theme-btn-icon">🔮</span>
      <span id="theme-btn-text">原生紫</span>
    </button>
  </div>

  <header>
    <div class="header-pill">
      <svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="var(--accent-1)"/></svg>
      Model Tracker
    </div>
    <h1>模型<span>性价比</span>追踪</h1>
    <p class="subtitle">点击卡片展开详情，随时输入余额查询可用次数</p>
  </header>

  <div class="form-wrapper" id="form-wrapper">
    <button class="form-toggle-btn" onclick="toggleForm()">
      <span class="form-toggle-label">
        <span class="plus-icon">＋</span>
        添加新记录
      </span>
      <span class="form-toggle-right" id="form-toggle-hint">点击展开</span>
    </button>
    <div class="form-body">
      <div class="form-inner">
        <div class="fields-grid">
          <div class="field-wrap">
            <label>来源渠道</label>
            <input id="f-source" type="text" placeholder="e.g. OpenRouter">
          </div>
          <div class="field-wrap">
            <label>模型名称</label>
            <input id="f-model" type="text" placeholder="e.g. gemini-2.0-pro">
          </div>
          <div class="field-wrap">
            <label>充值比（¥1 = ? 额度）</label>
            <input id="f-ratio" type="text" placeholder="e.g. 50 或 100/3">
            <span class="hint">支持表达式，如 100/3</span>
          </div>
          <div class="field-wrap">
            <label>单价（额度/次）</label>
            <input id="f-price" type="text" placeholder="e.g. 0.08 或 6/50">
            <span class="hint">支持表达式</span>
          </div>
          <div class="field-wrap full-col">
            <label>备注</label>
            <input id="f-note" type="text" placeholder="e.g. 月卡 ¥30→40额度">
          </div>
        </div>
        <button class="btn-add" onclick="addEntry()">＋ 添加到列表</button>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="entry-count">共 <strong id="count">0</strong> 条记录</div>
    <button class="btn-sort" id="sort-btn" onclick="toggleSort()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 5h10M5 8h6M7 11h2"/>
      </svg>
      按性价比排序
    </button>
  </div>

  <div class="cards-list" id="cards"></div>
  <div class="empty-state" id="empty">
    <!-- 空状态图标会随主题切换 -->
    <div class="empty-icon" id="empty-icon-slot">🫧</div>
    <div class="empty-text">还没有记录，添加第一条吧</div>
  </div>

</div>

<script>
/* =========================================
   🎨 主题切换逻辑
========================================== */
const THEMES = [
  { id: 'theme-purple', icon: '🔮', name: '原生紫', empty: '🫧' },
  { id: 'theme-blue',   icon: '❄️', name: '冰霜蓝', empty: '🧊' },
  { id: 'theme-cream',  icon: '🥐', name: '奶油黄', empty: '📦' },
  { id: 'theme-brutal', icon: '📜', name: '仿宋墨', empty: '📇' } // 变成了温润的旧文稿水墨风
];

let currentThemeIdx = 0;

function applyTheme(idx) {
  const t = THEMES[idx];
  document.documentElement.setAttribute('data-theme', t.id);
  document.getElementById('theme-btn-icon').textContent = t.icon;
  document.getElementById('theme-btn-text').textContent = t.name;
  document.getElementById('empty-icon-slot').textContent = t.empty;
}

function toggleTheme() {
  currentThemeIdx = (currentThemeIdx + 1) % THEMES.length;
  applyTheme(currentThemeIdx);
  localStorage.setItem('mt-theme-rgba', THEMES[currentThemeIdx].id);
}

// 初始化加载保存的主题
const savedThemeId = localStorage.getItem('mt-theme-rgba') || 'theme-purple';
currentThemeIdx = THEMES.findIndex(t => t.id === savedThemeId);
if (currentThemeIdx === -1) currentThemeIdx = 0;
applyTheme(currentThemeIdx);


/* =========================================
   📊 核心业务逻辑
========================================== */
let entries = JSON.parse(localStorage.getItem('mt-v4') || '[]');
let isSorted = false;
let editingId = null;

// 动态通过 CSS 变量获取 rgba 颜色
const chColorMap = {};
let chColorNext = 0;

function getChColorVar(source) {
  const key = (source||'').trim().toLowerCase() || '__none__';
  if (chColorMap[key] === undefined) {
    chColorMap[key] = chColorNext % 10;
    chColorNext++;
  }
  return `var(--ch${chColorMap[key]})`;
}

function rebuildColorMap() {
  Object.keys(chColorMap).forEach(k => delete chColorMap[k]);
  chColorNext = 0;
  const seen = [];
  entries.forEach(e => {
    const key = (e.source||'').trim().toLowerCase() || '__none__';
    if (!seen.includes(key)) seen.push(key);
  });
  seen.forEach(k => { chColorMap[k] = chColorNext % 10; chColorNext++; });
}

function save() { localStorage.setItem('mt-v4', JSON.stringify(entries)); }

function safeEval(expr) {
  if (!expr && expr !== 0) return null;
  const s = String(expr).trim();
  if (/^[\d\s\+\-\*\/\.]+$/.test(s)) {
    try {
      const v = Function('"use strict";return(' + s + ')')();
      return isFinite(v) && v > 0 ? v : null;
    } catch { return null; }
  }
  const n = parseFloat(s);
  return isFinite(n) && n > 0 ? n : null;
}

function calcCost(e) {
  const r = safeEval(e.ratio), p = safeEval(e.price);
  return (r && p) ? p / r : null;
}

function costCls(c) {
  if (c === null) return 'c-low';
  if (c <= 0.04)  return 'c-best';
  if (c <= 0.1)   return 'c-good';
  if (c <= 0.3)   return 'c-mid';
  return 'c-low';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtExpr(raw) {
  const s = String(raw||'').trim();
  const v = safeEval(s);
  if (!s) return '—';
  if (/[\/\*\+\-]/.test(s) && v !== null) return esc(s) + ' <small>≈ ' + v.toFixed(3) + '</small>';
  return esc(s);
}

function render() {
  rebuildColorMap();
  const el = document.getElementById('cards');
  const empty = document.getElementById('empty');
  document.getElementById('count').textContent = entries.length;
  el.innerHTML = '';

  if (!entries.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  let list = [...entries];
  if (isSorted) {
    list.sort((a, b) => {
      const ca = calcCost(a), cb = calcCost(b);
      if (ca === null && cb === null) return 0;
      if (ca === null) return 1;
      if (cb === null) return -1;
      return ca - cb;
    });
  }

  const costs = list.map(e => calcCost(e)).filter(c => c !== null);
  const best = costs.length ? Math.min(...costs) : null;

  list.forEach((e, i) => {
    const cost = calcCost(e);
    const costStr = cost !== null ? '¥' + cost.toFixed(4) : '—';
    const perYuan = cost !== null ? (1/cost).toFixed(1) + ' 次/¥' : '';
    const cls = costCls(cost);
    const rankCls = isSorted ? (i===0?'r1':i===1?'r2':i===2?'r3':'') : '';
    const rankTxt = isSorted ? (i+1) : '·';
    const isBest = cost !== null && best !== null && Math.abs(cost - best) < 0.000001;
    const ratio = safeEval(e.ratio) || 0;
    const price = safeEval(e.price) || 0;
    const chColorVar = getChColorVar(e.source);
    const isEditing = editingId === e.id;

    const card = document.createElement('div');
    card.className = 'model-card' + (isEditing ? ' open' : '');
    card.style.animationDelay = (i * 0.04) + 's';
    card.style.borderLeftColor = chColorVar;
    card.dataset.id = e.id;

    card.innerHTML = `
      <div class="card-main" onclick="toggleCard(this.parentElement)">
        <div class="card-rank ${rankCls}">${rankTxt}</div>
        <div class="card-info">
          <div class="card-source-wrap">
            <span class="ch-dot" style="background:${chColorVar}"></span>
            <span class="card-source" style="color:${chColorVar}">${esc(e.source)||'未知渠道'}</span>
          </div>
          <div class="card-model">${esc(e.model)||'未命名模型'}</div>
          ${e.note ? `<div class="card-note">${esc(e.note)}</div>` : ''}
        </div>
        <div class="card-value ${cls}">
          <div class="cost-label">¥ / 次</div>
          <div class="cost-num">${isBest && isSorted ? '🏆 ' : ''}${costStr}</div>
          ${perYuan ? `<div class="cost-sub">${perYuan}</div>` : ''}
        </div>
        <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6l4 4 4-4"/>
        </svg>
      </div>
      <div class="card-detail">
        ${isEditing ? `
        <div class="detail-edit" onclick="event.stopPropagation()">
          <div class="edit-grid">
            <div class="edit-field"><label>来源渠道</label><input id="e-source-${e.id}" value="${esc(e.source)}"></div>
            <div class="edit-field"><label>模型名称</label><input id="e-model-${e.id}" value="${esc(e.model)}"></div>
            <div class="edit-field"><label>充值比</label><input id="e-ratio-${e.id}" value="${esc(e.ratio)}"><span class="hint">支持表达式</span></div>
            <div class="edit-field"><label>单价</label><input id="e-price-${e.id}" value="${esc(e.price)}"><span class="hint">支持表达式</span></div>
            <div class="edit-field full-col"><label>备注</label><input id="e-note-${e.id}" value="${esc(e.note)}"></div>
          </div>
          <div class="edit-actions">
            <button class="btn-save" onclick="saveEdit(${e.id})">保存</button>
            <button class="btn-cancel" onclick="cancelEdit(event)">取消</button>
          </div>
        </div>
        ` : `
        <div class="detail-view">
          <div class="detail-row">
            <div class="detail-col">
              <div class="detail-lbl">充值比</div>
              <div class="detail-val">¥1 = ${fmtExpr(e.ratio)}</div>
              <div class="detail-sub-lbl">额度</div>
            </div>
            <div class="detail-col">
              <div class="detail-lbl">单价</div>
              <div class="detail-val">${fmtExpr(e.price)}</div>
              <div class="detail-sub-lbl">额度 / 次</div>
            </div>
            <div class="detail-col calc-col">
              <div class="detail-lbl">余额 → 可用次数</div>
              <div class="calc-wrap" onclick="event.stopPropagation()">
                <span class="calc-prefix">¥</span>
                <input class="calc-input" type="text" placeholder="输入余额"
                  data-ratio="${ratio}" data-price="${price}"
                  oninput="calcLive(this)" onclick="event.stopPropagation()">
              </div>
              <div class="calc-result">—</div>
            </div>
          </div>
          <div class="detail-actions" onclick="event.stopPropagation()">
            <button class="btn-edit" onclick="startEdit(${e.id}, event)">
              <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 2l3 3-9 9H2v-3L11 2z"/></svg>
              编辑
            </button>
            <button class="btn-del" onclick="delEntry(${e.id}, event)">
              <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 4l8 8M12 4l-8 8"/></svg>
              删除
            </button>
          </div>
        </div>
        `}
      </div>
    `;

    el.appendChild(card);
  });
}

function calcLive(input) {
  const ratio = parseFloat(input.dataset.ratio);
  const price = parseFloat(input.dataset.price);
  const b = safeEval(input.value);
  const resultEl = input.closest('.calc-col').querySelector('.calc-result');
  if (!b || !ratio || !price) { resultEl.textContent = '—'; resultEl.className = 'calc-result'; return; }
  const n = Math.floor((b * ratio) / price);
  resultEl.textContent = n.toLocaleString() + ' 次可用';
  resultEl.className = 'calc-result hit';
}

function toggleCard(card) {
  if (editingId) return;
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.model-card.open').forEach(c => c.classList.remove('open'));
  if (!wasOpen) card.classList.add('open');
}

function startEdit(id, ev) {
  ev.stopPropagation();
  editingId = id;
  render();
  document.querySelectorAll('.model-card').forEach(c => {
    if (parseInt(c.dataset.id) === id) c.classList.add('open');
  });
}

function cancelEdit(ev) {
  ev.stopPropagation();
  editingId = null;
  render();
}

function saveEdit(id) {
  const idx = entries.findIndex(e => e.id === id);
  if (idx === -1) return;
  entries[idx] = {
    ...entries[idx],
    source: document.getElementById('e-source-'+id).value.trim(),
    model:  document.getElementById('e-model-'+id).value.trim(),
    ratio:  document.getElementById('e-ratio-'+id).value.trim(),
    price:  document.getElementById('e-price-'+id).value.trim(),
    note:   document.getElementById('e-note-'+id).value.trim(),
  };
  editingId = null;
  save();
  render();
}

function toggleSort() {
  isSorted = !isSorted;
  document.getElementById('sort-btn').classList.toggle('active', isSorted);
  render();
}

function toggleForm() {
  const w = document.getElementById('form-wrapper');
  const hint = document.getElementById('form-toggle-hint');
  const isOpen = w.classList.toggle('open');
  hint.textContent = isOpen ? '点击收起' : '点击展开';
  if (isOpen) setTimeout(() => document.getElementById('f-source').focus(), 320);
}

function addEntry() {
  const source = document.getElementById('f-source').value.trim();
  const model  = document.getElementById('f-model').value.trim();
  const ratio  = document.getElementById('f-ratio').value.trim();
  const price  = document.getElementById('f-price').value.trim();
  const note   = document.getElementById('f-note').value.trim();

  if (!model && !source) { shake(document.querySelector('.btn-add')); return; }

  entries.unshift({ id: Date.now(), source, model, ratio, price, note });
  save();
  render();
  ['f-source','f-model','f-ratio','f-price','f-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-source').focus();
}

function delEntry(id, ev) {
  ev.stopPropagation();
  entries = entries.filter(e => e.id !== id);
  save();
  render();
}

function shake(el) {
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'shake 0.38s ease';
  setTimeout(() => el.style.animation = '', 400);
}

document.addEventListener('keydown', ev => {
  const ids = ['f-source','f-model','f-ratio','f-price','f-note'];
  if (ev.key === 'Enter' && ids.includes(document.activeElement.id)) addEntry();
  if (ev.key === 'Escape' && editingId) { editingId = null; render(); }
});

render();
</script>
</body>
</html>
