<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具箱导航</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
        /* 干净的浅灰白背景 */
        background-color: #f4f5f8;
        color: #4a4d57;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }

    /* 用两个非常淡的静态色块来凸显玻璃的透视感 */
    .bg-shape {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        z-index: 0;
        opacity: 0.5;
    }
    .shape1 { top: 10%; left: 15%; width: 40vw; height: 40vw; background: #e3ebf5; }
    .shape2 { bottom: 10%; right: 15%; width: 35vw; height: 35vw; background: #f5e3e8; }

    .container {
        position: relative;
        z-index: 1;
        text-align: center;
        width: 100%;
        max-width: 600px;
        padding: 0 20px;
    }

    h1 {
        font-size: 24px;
        font-weight: 500;
        margin-bottom: 40px;
        color: #333640;
        letter-spacing: 2px;
    }

    .nav-links {
        display: flex;
        flex-direction: column;
        gap: 20px;
        max-width: 320px;
        margin: 0 auto;
    }

    /* 基础液态玻璃样式 */
    .glass-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        text-decoration: none;
        color: #4a4d57;
        font-size: 16px;
        font-weight: 500;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        transition: all 0.2s ease;
    }

    .glass-btn:hover {
        background: rgba(255, 255, 255, 0.6);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
        transform: translateY(-2px);
    }
    
    .glass-btn:active {
        transform: translateY(1px);
    }

</style>
</head>
<body>

    <!-- 背景淡色块 -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="container">
        <h1>主页入口</h1>
        <div class="nav-links">
            <a href="prompt.html" class="glass-btn">🎭 人设管理器</a>
            <a href="calculator.html" class="glass-btn">💸 性价比计算器</a>
        </div>
    </div>

</body>
</html>
