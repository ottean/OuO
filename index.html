<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模型性价比追踪</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --glass-bg: rgba(255,255,255,0.18);
    --glass-border: rgba(255,255,255,0.38);
    --glass-shadow: rgba(80,60,120,0.12);
    --accent: #c084fc;
    --text: #1e1b2e;
    --text-soft: #6b6880;
    --text-muted: #a89fc0;
    --radius: 20px;
    --radius-sm: 12px;
  }

  /* channel palette — 10 hues, cycling */
  :root {
    --ch0: #a855f7; --ch0b: rgba(168,85,247,0.13);
    --ch1: #3b82f6; --ch1b: rgba(59,130,246,0.13);
    --ch2: #f97316; --ch2b: rgba(249,115,22,0.13);
    --ch3: #10b981; --ch3b: rgba(16,185,129,0.13);
    --ch4: #e879f9; --ch4b: rgba(232,121,249,0.13);
    --ch5: #f59e0b; --ch5b: rgba(245,158,11,0.13);
    --ch6: #06b6d4; --ch6b: rgba(6,182,212,0.13);
    --ch7: #ef4444; --ch7b: rgba(239,68,68,0.13);
    --ch8: #84cc16; --ch8b: rgba(132,204,22,0.13);
    --ch9: #8b5cf6; --ch9b: rgba(139,92,246,0.13);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: #f0ecff;
    min-height: 100vh;
    color: var(--text);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(192,132,252,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(56,189,248,0.28) 0%, transparent 55%),
      radial-gradient(ellipse 50% 60% at 60% 20%, rgba(249,115,22,0.18) 0%, transparent 50%),
      radial-gradient(ellipse 70% 40% at 10% 80%, rgba(167,139,250,0.22) 0%, transparent 60%);
    z-index: 0;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 16px 80px;
  }

  /* ── Header ── */
  header { margin-bottom: 28px; animation: fadeUp 0.5s ease both; }

  .header-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(192,132,252,0.18);
    border: 1px solid rgba(192,132,252,0.35);
    border-radius: 999px;
    padding: 4px 13px;
    font-size: 10.5px;
    font-weight: 600;
    color: #7c3aed;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    margin-bottom: 10px;
    backdrop-filter: blur(8px);
  }

  h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 5px;
  }

  h1 span {
    background: linear-gradient(135deg, #a855f7, #f97316);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle { font-size: 13px; color: var(--text-soft); font-weight: 300; }

  /* ── Glass ── */
  .glass-card {
    background: var(--glass-bg);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow: 0 4px 32px var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.6);
  }

  /* ── Collapsible form ── */
  .form-wrapper {
    margin-bottom: 14px;
    animation: fadeUp 0.5s 0.06s ease both;
  }

  .form-toggle-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 20px;
    background: rgba(255,255,255,0.28);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.45);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 2px 16px rgba(80,60,120,0.07), inset 0 1px 0 rgba(255,255,255,0.65);
  }

  .form-toggle-btn:hover {
    background: rgba(255,255,255,0.38);
  }

  .form-wrapper.open .form-toggle-btn {
    border-radius: var(--radius) var(--radius) 0 0;
    border-bottom-color: rgba(168,159,192,0.2);
  }

  .form-toggle-label {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
  }

  .form-toggle-label .plus-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(192,132,252,0.7), rgba(249,115,22,0.55));
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 15px;
    line-height: 1;
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
  }

  .form-wrapper.open .plus-icon { transform: rotate(45deg); }

  .form-toggle-right {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  .form-body {
    max-height: 0;
    overflow: hidden;
    /* 👇 核心修复：收起时彻底透明、隐藏，解决底部漏出白线的问题 */
    opacity: 0;
    visibility: hidden;
    
    transition: max-height 0.36s cubic-bezier(.4,0,.2,1), opacity 0.2s, visibility 0.36s;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    /* 边框颜色可以直接固定了，因为 opacity 会隐藏它 */
    border: 1px solid rgba(255, 255, 255, 0.8); 
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    /* 👇 收起时移除阴影 */
    box-shadow: none; 
  }

  .form-wrapper.open .form-body { 
    max-height: 420px; 
    /* 👇 展开时恢复显示和阴影 */
    opacity: 1;
    visibility: visible;
    box-shadow: 0 4px 20px var(--glass-shadow); 
    transition: max-height 0.36s cubic-bezier(.4,0,.2,1), opacity 0.4s, visibility 0s;
  }

  .form-inner { padding: 18px 20px 20px; }

  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
    margin-bottom: 9px;
  }

  .field-wrap { display: flex; flex-direction: column; gap: 4px; }

  .field-wrap label {
    font-size: 9.5px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding-left: 2px;
  }

  input {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.55);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: all 0.2s;
    width: 100%;
    backdrop-filter: blur(8px);
  }

  input::placeholder { color: var(--text-muted); font-size: 12px; }

  input:focus {
    border-color: rgba(192,132,252,0.6);
    background: rgba(255,255,255,0.72);
    box-shadow: 0 0 0 3px rgba(192,132,252,0.13);
  }

  .hint { font-size: 10px; color: var(--text-muted); padding-left: 2px; font-style: italic; }
  .full-col { grid-column: 1 / -1; }

  .btn-add {
    width: 100%;
    padding: 11px;
    background: linear-gradient(135deg, rgba(192,132,252,0.72), rgba(249,115,22,0.58));
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: var(--radius-sm);
    color: white;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(192,132,252,0.35); }
  .btn-add:active { transform: translateY(0); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding: 0 2px;
    animation: fadeUp 0.5s 0.12s ease both;
  }

  .entry-count { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .entry-count strong { color: var(--accent); font-weight: 500; }

  .btn-sort {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 999px;
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }

  .btn-sort:hover, .btn-sort.active {
    background: rgba(192,132,252,0.22);
    color: #7c3aed;
    border-color: rgba(192,132,252,0.45);
  }

  /* ── Cards ── */
  .cards-list { display: flex; flex-direction: column; gap: 10px; }

  .model-card {
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.42);
    border-radius: var(--radius);
    box-shadow: 0 2px 18px rgba(80,60,120,0.08), inset 0 1px 0 rgba(255,255,255,0.65);
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
    animation: fadeUp 0.35s ease both;
    cursor: pointer;
  }

  .model-card:hover {
    box-shadow: 0 6px 28px rgba(80,60,120,0.13), inset 0 1px 0 rgba(255,255,255,0.65);
    transform: translateY(-1px);
  }

  /* channel color stripe on left */
  .model-card { border-left-width: 3px; }

  /* collapsed row */
  .card-main {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    user-select: none;
  }

  .card-rank {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
  }

  .card-rank.r1 { background: rgba(255,214,0,0.22); border-color: rgba(255,214,0,0.5); color: #b45309; }
  .card-rank.r2 { background: rgba(148,163,184,0.22); border-color: rgba(148,163,184,0.5); color: #475569; }
  .card-rank.r3 { background: rgba(180,120,80,0.2); border-color: rgba(180,120,80,0.4); color: #92400e; }

  .card-info { flex: 1; min-width: 0; }

  .card-source-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
  }

  .ch-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .card-source {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .card-model {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: #6d28d9;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-style: italic;
  }

  .card-note {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-value { text-align: right; flex-shrink: 0; }

  .cost-label {
    font-size: 9.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 3px;
  }

  .cost-num {
    font-family: 'DM Mono', monospace;
    font-size: 19px;
    font-weight: 400;
    line-height: 1;
  }

  .cost-sub {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }

  .c-best .cost-num { color: #16a34a; }
  .c-good .cost-num { color: #0284c7; }
  .c-mid  .cost-num { color: #c2410c; }
  .c-low  .cost-num { color: var(--text-muted); }

  .chevron {
    margin-left: 6px;
    color: var(--text-muted);
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    flex-shrink: 0;
  }

  .model-card.open .chevron { transform: rotate(180deg); }

  /* ── Expanded detail ── */
  .card-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.32s cubic-bezier(.4,0,.2,1);
  }

  .model-card.open .card-detail { max-height: 320px; }

  /* view mode */
  .detail-view {
    border-top: 1px solid rgba(168,159,192,0.18);
    padding: 13px 16px 15px;
  }

  .detail-row {
    display: grid;
    /* 前两列等宽，计算器给稍多一点空间 */
    grid-template-columns: 1fr 1fr 1.3fr; 
    gap: 0;
  }

  .detail-col { display: flex; flex-direction: column; }

  /* 使用 nth-child 精准控制竖线，避免后续换行样式冲突 */
  .detail-col:nth-child(2),
  .detail-col:nth-child(3) {
    border-left: 1px solid rgba(168,159,192,0.18);
    padding-left: 16px;
    margin-left: 16px;
  }

  .detail-lbl {
    font-size: 9.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .detail-val {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--text);
  }

  .detail-val small {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 4px;
  }

  .detail-sub-lbl {
    font-size: 10px;
    color: var(--text-muted);
    font-style: italic;
    margin-top: 2px;
  }

  /* calculator */
  .calc-col { min-width: 120px; }

  .calc-wrap {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.65);
    border-radius: 10px;
    padding: 0 10px;
    margin-top: 2px;
    transition: all 0.2s;
  }

  .calc-wrap:focus-within {
    border-color: rgba(192,132,252,0.55);
    box-shadow: 0 0 0 3px rgba(192,132,252,0.12);
  }

  .calc-prefix {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    margin-right: 4px;
    flex-shrink: 0;
  }

  .calc-input {
    background: transparent !important;
    border: none !important;
    border-radius: 0 !important;
    padding: 7px 0 !important;
    font-size: 13px;
    width: 80px;
    box-shadow: none !important;
    backdrop-filter: none;
  }

  .calc-input:focus { background: transparent !important; box-shadow: none !important; border-color: transparent !important; }

  .calc-result {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 5px;
    min-height: 15px;
    transition: color 0.2s;
  }

  .calc-result.hit { color: #7c3aed; font-weight: 600; font-size: 12px; }

  /* action bar */
  .detail-actions {
    display: flex;
    gap: 7px;
    margin-top: 12px;
    padding-top: 11px;
    border-top: 1px solid rgba(168,159,192,0.13);
  }

  .btn-edit, .btn-del {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 11px;
    font-family: 'Sora', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-edit {
    border: 1px solid rgba(192,132,252,0.35);
    background: rgba(192,132,252,0.1);
    color: #7c3aed;
  }

  .btn-edit:hover { background: rgba(192,132,252,0.22); }

  .btn-del {
    border: 1px solid rgba(248,113,113,0.35);
    background: rgba(248,113,113,0.1);
    color: #ef4444;
    margin-left: auto;
  }

  .btn-del:hover { background: rgba(248,113,113,0.22); }

  /* ── Edit mode (inline) ── */
  .detail-edit {
    border-top: 1px solid rgba(168,159,192,0.18);
    padding: 13px 16px 15px;
  }

  .edit-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .edit-field { display: flex; flex-direction: column; gap: 3px; }

  .edit-field label {
    font-size: 9.5px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding-left: 2px;
  }

  .edit-field input {
    padding: 7px 10px;
    font-size: 12px;
  }

  .edit-actions { display: flex; gap: 8px; }

  .btn-save {
    flex: 1;
    padding: 8px;
    background: linear-gradient(135deg, rgba(192,132,252,0.7), rgba(249,115,22,0.55));
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 10px;
    color: white;
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-save:hover { box-shadow: 0 4px 14px rgba(192,132,252,0.35); }

  .btn-cancel {
    padding: 8px 16px;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 10px;
    color: var(--text-soft);
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  /* empty */
  .empty-state {
    text-align: center;
    padding: 56px 24px;
    animation: fadeUp 0.5s 0.18s ease both;
    display: none;
  }

  .empty-icon { font-size: 38px; margin-bottom: 10px; opacity: 0.4; }
  .empty-text { font-size: 13px; color: var(--text-muted); font-weight: 300; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }

  @media (max-width: 480px) {
    .fields-grid, .edit-grid { grid-template-columns: 1fr; }
    .model-card.open .card-detail { max-height: 480px; }
    
    /* 移动端 Grid 布局：前两个并排，第三个换行占满 */
    .detail-row {
      grid-template-columns: 1fr 1fr; 
      gap: 0;
    }
    .detail-col.calc-col {
      grid-column: 1 / -1; /* 计算器跨越所有列 */
    }
    .detail-col:nth-child(2) {
      margin-left: 12px;
      padding-left: 12px;
    }
    .detail-col:nth-child(3) {
      border-left: none;
      margin-left: 0;
      padding-left: 0;
      border-top: 1px solid rgba(168,159,192,0.18);
      margin-top: 12px;
      padding-top: 12px;
    }
  }

</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-pill">
      <svg width="7" height="7" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#a855f7"/></svg>
      Model Tracker
    </div>
    <h1>模型<span>性价比</span>追踪</h1>
    <p class="subtitle">点击卡片展开详情，随时输入余额查询可用次数</p>
  </header>

  <!-- Collapsible form -->
  <div class="form-wrapper" id="form-wrapper">
    <button class="form-toggle-btn" onclick="toggleForm()">
      <span class="form-toggle-label">
        <span class="plus-icon">＋</span>
        添加新记录
      </span>
      <span class="form-toggle-right" id="form-toggle-hint">点击展开</span>
    </button>
    <div class="form-body">
      <div class="form-inner">
        <div class="fields-grid">
          <div class="field-wrap">
            <label>来源渠道</label>
            <input id="f-source" type="text" placeholder="e.g. OpenRouter">
          </div>
          <div class="field-wrap">
            <label>模型名称</label>
            <input id="f-model" type="text" placeholder="e.g. gemini-2.0-pro">
          </div>
          <div class="field-wrap">
            <label>充值比（¥1 = ? 额度）</label>
            <input id="f-ratio" type="text" placeholder="e.g. 50 或 100/3">
            <span class="hint">支持表达式，如 100/3</span>
          </div>
          <div class="field-wrap">
            <label>单价（额度/次）</label>
            <input id="f-price" type="text" placeholder="e.g. 0.08 或 6/50">
            <span class="hint">支持表达式</span>
          </div>
          <div class="field-wrap full-col">
            <label>备注</label>
            <input id="f-note" type="text" placeholder="e.g. 月卡 ¥30→40额度">
          </div>
        </div>
        <button class="btn-add" onclick="addEntry()">＋ 添加到列表</button>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="entry-count">共 <strong id="count">0</strong> 条记录</div>
    <button class="btn-sort" id="sort-btn" onclick="toggleSort()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 5h10M5 8h6M7 11h2"/>
      </svg>
      按性价比排序
    </button>
  </div>

  <div class="cards-list" id="cards"></div>
  <div class="empty-state" id="empty">
    <div class="empty-icon">🫧</div>
    <div class="empty-text">还没有记录，添加第一条吧</div>
  </div>

</div>
<script>
let entries = JSON.parse(localStorage.getItem('mt-v4') || '[]');
let isSorted = false;
let editingId = null;

// ── channel → color index map ──
const chColorMap = {};
let chColorNext = 0;
const CH_COLORS = ['#a855f7','#3b82f6','#f97316','#10b981','#e879f9','#f59e0b','#06b6d4','#ef4444','#84cc16','#8b5cf6'];
const CH_BG     = ['rgba(168,85,247,0.13)','rgba(59,130,246,0.13)','rgba(249,115,22,0.13)','rgba(16,185,129,0.13)','rgba(232,121,249,0.13)','rgba(245,158,11,0.13)','rgba(6,182,212,0.13)','rgba(239,68,68,0.13)','rgba(132,204,22,0.13)','rgba(139,92,246,0.13)'];

function getChColor(source) {
  const key = (source||'').trim().toLowerCase() || '__none__';
  if (chColorMap[key] === undefined) {
    chColorMap[key] = chColorNext % CH_COLORS.length;
    chColorNext++;
  }
  return chColorMap[key];
}

function rebuildColorMap() {
  Object.keys(chColorMap).forEach(k => delete chColorMap[k]);
  chColorNext = 0;
  // assign in insertion order
  const seen = [];
  entries.forEach(e => {
    const key = (e.source||'').trim().toLowerCase() || '__none__';
    if (!seen.includes(key)) seen.push(key);
  });
  seen.forEach(k => { chColorMap[k] = chColorNext % CH_COLORS.length; chColorNext++; });
}

function save() { localStorage.setItem('mt-v4', JSON.stringify(entries)); }

function safeEval(expr) {
  if (!expr && expr !== 0) return null;
  const s = String(expr).trim();
  if (/^[\d\s\+\-\*\/\.]+$/.test(s)) {
    try {
      const v = Function('"use strict";return(' + s + ')')();
      return isFinite(v) && v > 0 ? v : null;
    } catch { return null; }
  }
  const n = parseFloat(s);
  return isFinite(n) && n > 0 ? n : null;
}

function calcCost(e) {
  const r = safeEval(e.ratio), p = safeEval(e.price);
  return (r && p) ? p / r : null;
}

function costCls(c) {
  if (c === null) return 'c-low';
  if (c <= 0.04)  return 'c-best';
  if (c <= 0.1)   return 'c-good';
  if (c <= 0.3)   return 'c-mid';
  return 'c-low';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtExpr(raw) {
  const s = String(raw||'').trim();
  const v = safeEval(s);
  if (!s) return '—';
  if (/[\/\*\+\-]/.test(s) && v !== null) return esc(s) + ' <small>≈ ' + v.toFixed(3) + '</small>';
  return esc(s);
}

function render() {
  rebuildColorMap();
  const el = document.getElementById('cards');
  const empty = document.getElementById('empty');
  document.getElementById('count').textContent = entries.length;
  el.innerHTML = '';

  if (!entries.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  let list = [...entries];
  if (isSorted) {
    list.sort((a, b) => {
      const ca = calcCost(a), cb = calcCost(b);
      if (ca === null && cb === null) return 0;
      if (ca === null) return 1;
      if (cb === null) return -1;
      return ca - cb;
    });
  }

  const costs = list.map(e => calcCost(e)).filter(c => c !== null);
  const best = costs.length ? Math.min(...costs) : null;

  list.forEach((e, i) => {
    const cost = calcCost(e);
    const costStr = cost !== null ? '¥' + cost.toFixed(4) : '—';
    const perYuan = cost !== null ? (1/cost).toFixed(1) + ' 次/¥' : '';
    const cls = costCls(cost);
    const rankCls = isSorted ? (i===0?'r1':i===1?'r2':i===2?'r3':'') : '';
    const rankTxt = isSorted ? (i+1) : '·';
    const isBest = cost !== null && best !== null && Math.abs(cost - best) < 0.000001;
    const ratio = safeEval(e.ratio) || 0;
    const price = safeEval(e.price) || 0;
    const ci = getChColor(e.source);
    const chColor = CH_COLORS[ci];
    const chBg = CH_BG[ci];
    const isEditing = editingId === e.id;

    const card = document.createElement('div');
    card.className = 'model-card' + (isEditing ? ' open' : '');
    card.style.animationDelay = (i * 0.04) + 's';
    card.style.borderLeftColor = chColor;
    card.dataset.id = e.id;

    card.innerHTML = `
      <div class="card-main" onclick="toggleCard(this.parentElement)">
        <div class="card-rank ${rankCls}">${rankTxt}</div>
        <div class="card-info">
          <div class="card-source-wrap">
            <span class="ch-dot" style="background:${chColor}"></span>
            <span class="card-source" style="color:${chColor}">${esc(e.source)||'未知渠道'}</span>
          </div>
          <div class="card-model">${esc(e.model)||'未命名模型'}</div>
          ${e.note ? `<div class="card-note">${esc(e.note)}</div>` : ''}
        </div>
        <div class="card-value ${cls}">
          <div class="cost-label">¥ / 次</div>
          <div class="cost-num">${isBest && isSorted ? '🏆 ' : ''}${costStr}</div>
          ${perYuan ? `<div class="cost-sub">${perYuan}</div>` : ''}
        </div>
        <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6l4 4 4-4"/>
        </svg>
      </div>
      <div class="card-detail">
        ${isEditing ? `
        <div class="detail-edit" onclick="event.stopPropagation()">
          <div class="edit-grid">
            <div class="edit-field"><label>来源渠道</label><input id="e-source-${e.id}" value="${esc(e.source)}"></div>
            <div class="edit-field"><label>模型名称</label><input id="e-model-${e.id}" value="${esc(e.model)}"></div>
            <div class="edit-field"><label>充值比</label><input id="e-ratio-${e.id}" value="${esc(e.ratio)}"><span class="hint">支持表达式</span></div>
            <div class="edit-field"><label>单价</label><input id="e-price-${e.id}" value="${esc(e.price)}"><span class="hint">支持表达式</span></div>
            <div class="edit-field full-col"><label>备注</label><input id="e-note-${e.id}" value="${esc(e.note)}"></div>
          </div>
          <div class="edit-actions">
            <button class="btn-save" onclick="saveEdit(${e.id})">保存</button>
            <button class="btn-cancel" onclick="cancelEdit(event)">取消</button>
          </div>
        </div>
        ` : `
        <div class="detail-view">
          <div class="detail-row">
            <div class="detail-col">
              <div class="detail-lbl">充值比</div>
              <div class="detail-val">¥1 = ${fmtExpr(e.ratio)}</div>
              <div class="detail-sub-lbl">额度</div>
            </div>
            <div class="detail-col">
              <div class="detail-lbl">单价</div>
              <div class="detail-val">${fmtExpr(e.price)}</div>
              <div class="detail-sub-lbl">额度 / 次</div>
            </div>
            <div class="detail-col calc-col">
              <div class="detail-lbl">余额 → 可用次数</div>
              <div class="calc-wrap" onclick="event.stopPropagation()">
                <span class="calc-prefix">¥</span>
                <input class="calc-input" type="text" placeholder="输入余额"
                  data-ratio="${ratio}" data-price="${price}"
                  oninput="calcLive(this)" onclick="event.stopPropagation()">
              </div>
              <div class="calc-result">—</div>
            </div>
          </div>
          <div class="detail-actions" onclick="event.stopPropagation()">
            <button class="btn-edit" onclick="startEdit(${e.id}, event)">
              <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 2l3 3-9 9H2v-3L11 2z"/></svg>
              编辑
            </button>
            <button class="btn-del" onclick="delEntry(${e.id}, event)">
              <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 4l8 8M12 4l-8 8"/></svg>
              删除
            </button>
          </div>
        </div>
        `}
      </div>
    `;

    el.appendChild(card);
  });
}

function calcLive(input) {
  const ratio = parseFloat(input.dataset.ratio);
  const price = parseFloat(input.dataset.price);
  const b = safeEval(input.value);
  const resultEl = input.closest('.calc-col').querySelector('.calc-result');
  if (!b || !ratio || !price) { resultEl.textContent = '—'; resultEl.className = 'calc-result'; return; }
  const n = Math.floor((b * ratio) / price);
  resultEl.textContent = n.toLocaleString() + ' 次可用';
  resultEl.className = 'calc-result hit';
}

function toggleCard(card) {
  if (editingId) return;
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.model-card.open').forEach(c => c.classList.remove('open'));
  if (!wasOpen) card.classList.add('open');
}

function startEdit(id, ev) {
  ev.stopPropagation();
  editingId = id;
  render();
  // keep card open
  document.querySelectorAll('.model-card').forEach(c => {
    if (parseInt(c.dataset.id) === id) c.classList.add('open');
  });
}

function cancelEdit(ev) {
  ev.stopPropagation();
  editingId = null;
  render();
}

function saveEdit(id) {
  const idx = entries.findIndex(e => e.id === id);
  if (idx === -1) return;
  entries[idx] = {
    ...entries[idx],
    source: document.getElementById('e-source-'+id).value.trim(),
    model:  document.getElementById('e-model-'+id).value.trim(),
    ratio:  document.getElementById('e-ratio-'+id).value.trim(),
    price:  document.getElementById('e-price-'+id).value.trim(),
    note:   document.getElementById('e-note-'+id).value.trim(),
  };
  editingId = null;
  save();
  render();
}

function toggleSort() {
  isSorted = !isSorted;
  document.getElementById('sort-btn').classList.toggle('active', isSorted);
  render();
}

function toggleForm() {
  const w = document.getElementById('form-wrapper');
  const hint = document.getElementById('form-toggle-hint');
  const isOpen = w.classList.toggle('open');
  hint.textContent = isOpen ? '点击收起' : '点击展开';
  if (isOpen) setTimeout(() => document.getElementById('f-source').focus(), 320);
}

function addEntry() {
  const source = document.getElementById('f-source').value.trim();
  const model  = document.getElementById('f-model').value.trim();
  const ratio  = document.getElementById('f-ratio').value.trim();
  const price  = document.getElementById('f-price').value.trim();
  const note   = document.getElementById('f-note').value.trim();

  if (!model && !source) { shake(document.querySelector('.btn-add')); return; }

  entries.unshift({ id: Date.now(), source, model, ratio, price, note });
  save();
  render();
  ['f-source','f-model','f-ratio','f-price','f-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-source').focus();
}

function delEntry(id, ev) {
  ev.stopPropagation();
  entries = entries.filter(e => e.id !== id);
  save();
  render();
}

function shake(el) {
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'shake 0.38s ease';
  setTimeout(() => el.style.animation = '', 400);
}

document.addEventListener('keydown', ev => {
  const ids = ['f-source','f-model','f-ratio','f-price','f-note'];
  if (ev.key === 'Enter' && ids.includes(document.activeElement.id)) addEntry();
  if (ev.key === 'Escape' && editingId) { editingId = null; render(); }
});

render();
</script>
</body>
</html>
