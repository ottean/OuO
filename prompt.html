<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoの社交面具</title>
    <style>
        /* 基础与字体 */
        :root {
            --text-color: #5c627a;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(144, 153, 190, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f7f9fc;
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 滚动条美化 (macOS/iOS 悬浮细条风) */
        ::-webkit-scrollbar {
            width: 8px;  
            height: 8px; 
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(161, 196, 253, 0.5); 
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(161, 196, 253, 0.9); 
        }

        /* 背景液态模糊色块 */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.7;
            animation: float 15s ease-in-out infinite alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #e0c3fc; }
        .blob-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: #c2e9fb; }
        .blob-3 { top: 40%; left: 30%; width: 40vw; height: 40vw; background: #ffd1ff; animation-delay: -5s;}

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        /* 视图容器与动画 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            /* 整体上下边距减小，给编辑区留出更多天地 */
            padding: 20px; 
        }

        .view {
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 列表视图设为 block */
        #view-list.active { display: block; }

        /* 编辑视图设为 flex，用来做高度的自适应吃满 */
        #view-edit.active {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 40px); /* 减去容器的上下 padding */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 头部与返回键 */
        header {
            margin-bottom: 25px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 999px;
            color: #6a7495;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(144, 153, 190, 0.1);
            margin-bottom: 15px;
            cursor: pointer;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateX(-4px);
            color: #5c627a;
        }

        header h1 {
            font-weight: 600;
            font-size: 28px;
            letter-spacing: 1px;
            color: #6a7495;
            text-align: center;
        }

        /* 工具栏：统计 + 导入导出 */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .count-text { font-size: 14px; color: #9ba4c4; }
        .count-text strong { color: #7983a8; font-weight: 600; }

        .actions-right { display: flex; gap: 10px; }

        .btn-tool {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 999px;
            color: #6a7495;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
        }

        .btn-tool:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(144, 153, 190, 0.15);
        }

        /* 玻璃态通用类 */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
        }

        /* 卡片网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        /* 卡片样式 */
        .card {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: center;
            padding: 15px;
            word-break: break-word;
            line-height: 1.4;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 40px 0 rgba(144, 153, 190, 0.25);
        }

        .card-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-color);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px; 
        }

        .card-count {
            font-size: 8px;
            color: #9ba4c4;
            font-family: "DM Mono", monospace, sans-serif;
            background: rgba(255, 255, 255, 0.4);
            padding: 2px 6px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .add-card {
            font-size: 36px;
            color: #9ba4c4;
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.7);
        }

        .add-card:hover {
            color: #7983a8;
            background: rgba(255, 255, 255, 0.4);
        }

        /* ================= 沉浸式编辑页 (高度自动延展优化) ================= */
        
        .edit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0; /* 防止头部被压缩 */
        }

        .edit-header .back-link {
            margin-bottom: 0; 
        }

        .btn-save {
            padding: 8px 20px;
            border: none;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #a1c4fd; 
            color: #fff;
            box-shadow: 0 4px 15px rgba(161, 196, 253, 0.4);
        }

        .btn-save:hover { filter: brightness(0.95); transform: scale(1.03); }
        .btn-save:active { transform: scale(0.97); }

        /* 全屏沉浸编辑器主体 */
        .immersive-editor {
            /* 关键修改：自动扩张吃满所有剩余高度 */
            flex: 1; 
            display: flex;
            flex-direction: column;
            /* 关键修改：左右 padding 减小，去掉“厚重感” */
            padding: 20px 15px; 
        }

        /* 标题无边框输入 */
        .input-title {
            width: 100%;
            background: transparent;
            border: none;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-color);
            outline: none;
            padding: 0 0 15px 5px; /* 左侧留点呼吸感 */
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(144, 153, 190, 0.15); 
            flex-shrink: 0;
        }
        
        .input-title::placeholder {
            color: #b0b6cf;
            font-weight: 500;
        }

        /* 文本域包裹层 */
        .textarea-wrapper {
            flex: 1; /* 占据编辑器内部所有高度 */
            display: flex;
            flex-direction: column;
            resize: vertical; 
            overflow: hidden; 
        }

        .input-body {
            flex: 1; 
            width: 100%;
            background: transparent;
            border: none;
            resize: none; 
            outline: none;
            padding: 0 5px; /* 统一呼吸感 */
            padding-right: 15px;
            padding-bottom: 25px; 
            font-size: 16px;
            color: var(--text-color);
            line-height: 1.7;
        }

        .input-body::placeholder {
            color: #b0b6cf;
        }

        /* 底部删除按钮 */
        .footer-actions {
            text-align: center;
            /* 关键修改：推到最底部 */
            margin-top: auto; 
            padding-top: 15px;
            padding-bottom: 10px;
            flex-shrink: 0;
        }

        .btn-delete-text {
            background: transparent;
            border: none;
            color: #ff9fb0; 
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 10px 20px;
            transition: color 0.2s;
        }

        .btn-delete-text:hover {
            color: #ff748c;
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="container">
        
        <!-- ================= 视图 1：主列表 ================= -->
        <div id="view-list" class="view active">
            <header>
                <a href="index.html" class="back-link">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    返回Zoの百宝箱
                </a>
                <h1>奇迹ZoZo登场</h1>
            </header>

            <div class="toolbar">
                <div class="count-text">共 <strong id="prompt-count">0</strong> 个人设卡片</div>
                <div class="actions-right">
                    <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(event)">
                    <button class="btn-tool" onclick="document.getElementById('import-file').click()">
                        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 12V4m0 0L5 7m3-3l3 3M2 14h12"/></svg>
                        导入
                    </button>
                    <button class="btn-tool" onclick="exportData()">
                        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 4v8m0 0l-3-3m3 3l3-3M2 14h12"/></svg>
                        导出
                    </button>
                </div>
            </div>

            <div class="grid" id="card-container">
                <!-- 卡片动态生成区 -->
            </div>
        </div>

        <!-- ================= 视图 2：沉浸式编辑页 ================= -->
        <div id="view-edit" class="view">
            
            <header class="edit-header">
                <button class="back-link" onclick="switchView('list')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                    返回Zoの衣柜
                </button>
                <button class="btn-save" id="btn-save">保存</button>
            </header>

            <!-- 无边框沉浸式编辑器 -->
            <div class="immersive-editor glass">
                <input type="text" id="input-remark" class="input-title" placeholder="输入人物备注...">
                
                <div class="textarea-wrapper">
                    <textarea id="input-prompt" class="input-body" placeholder="在这里自由输入或粘贴你的 Prompt 人设设定..."></textarea>
                </div>
            </div>

            <!-- 低调的文字删除键 -->
            <div class="footer-actions">
                <button class="btn-delete-text" id="btn-delete" style="display: none;">Zo选择丢弃该面具</button>
            </div>

        </div>

    </div>

    <script>
        let characters = JSON.parse(localStorage.getItem('prompts_data')) || [];
        let currentEditId = null;

        // DOM 元素
        const viewList = document.getElementById('view-list');
        const viewEdit = document.getElementById('view-edit');
        const container = document.getElementById('card-container');
        const countText = document.getElementById('prompt-count');
        const inputRemark = document.getElementById('input-remark');
        const inputPrompt = document.getElementById('input-prompt');
        const btnSave = document.getElementById('btn-save');
        const btnDelete = document.getElementById('btn-delete');

        // 计算字符数（去空白符）
        function getCharCount(text) {
            if (!text) return 0;
            return text.replace(/\s+/g, '').length;
        }

        // 切换视图 (SPA)
        function switchView(viewName) {
            if (viewName === 'list') {
                viewEdit.classList.remove('active');
                viewList.classList.add('active');
                currentEditId = null;
                renderCards(); 
            } else if (viewName === 'edit') {
                viewList.classList.remove('active');
                viewEdit.classList.add('active');
                window.scrollTo(0, 0); 
            }
        }

        // 渲染主页卡片
        function renderCards() {
            container.innerHTML = ''; 
            countText.textContent = characters.length; 

            // 渲染已有角色卡片
            characters.forEach(char => {
                const card = document.createElement('div');
                card.className = 'card glass';
                card.onclick = () => openEditor(char.id);

                const nameDiv = document.createElement('div');
                nameDiv.className = 'card-name';
                nameDiv.textContent = char.remark;

                const charCount = getCharCount(char.prompt);
                const countDiv = document.createElement('div');
                countDiv.className = 'card-count';
                countDiv.textContent = charCount + ' 字符';

                card.appendChild(nameDiv);
                card.appendChild(countDiv);
                
                container.appendChild(card);
            });

            // 渲染“添加”按钮卡片
            const addCard = document.createElement('div');
            addCard.className = 'card glass add-card';
            addCard.textContent = '+';
            addCard.onclick = () => openEditor(null);
            container.appendChild(addCard);
        }

        // 打开全屏编辑器
        function openEditor(id) {
            currentEditId = id;
            if (id) {
                const char = characters.find(c => c.id === id);
                inputRemark.value = char.remark;
                inputPrompt.value = char.prompt;
                btnDelete.style.display = 'inline-block';
            } else {
                inputRemark.value = '';
                inputPrompt.value = '';
                btnDelete.style.display = 'none';
            }
            switchView('edit');
            setTimeout(() => inputRemark.focus(), 100); 
        }

        // 保存数据
        function saveData() {
            const remarkText = inputRemark.value.trim();
            const promptText = inputPrompt.value.trim();

            if (!remarkText) {
                alert('请填写人物备注噢～');
                return;
            }

            if (currentEditId) {
                const index = characters.findIndex(c => c.id === currentEditId);
                if (index !== -1) {
                    characters[index].remark = remarkText;
                    characters[index].prompt = promptText;
                }
            } else {
                characters.push({
                    id: Date.now().toString(),
                    remark: remarkText,
                    prompt: promptText
                });
            }

            localStorage.setItem('prompts_data', JSON.stringify(characters));
            switchView('list'); 
        }

        // 删除数据
        function deleteData() {
            if(confirm('确定要彻底删除这个人设吗？')) {
                characters = characters.filter(c => c.id !== currentEditId);
                localStorage.setItem('prompts_data', JSON.stringify(characters));
                switchView('list');
            }
        }

        // 导出 JSON
        function exportData() {
            if (characters.length === 0) return alert('当前没有人设可以导出 🫧');
            
            const dataStr = JSON.stringify(characters, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `Prompt_Backup_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 导入 JSON
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (!Array.isArray(importedData)) throw new Error('格式不正确');
                    
                    const confirmMsg = `成功读取 ${importedData.length} 个人设卡片。\n\n点击【确定】覆盖当前所有数据\n点击【取消】将新数据追加到列表里`;
                    
                    if (confirm(confirmMsg)) {
                        characters = importedData; 
                    } else {
                        const existingIds = new Set(characters.map(item => item.id));
                        const newEntries = importedData.filter(item => !existingIds.has(item.id));
                        characters = [...newEntries, ...characters];
                    }
                    
                    localStorage.setItem('prompts_data', JSON.stringify(characters));
                    renderCards();
                    alert('导入成功！✨');
                } catch (err) {
                    alert('导入失败：文件格式不正确或已损坏。请确保是之前导出的人设 JSON 文件。');
                } finally {
                    event.target.value = ''; 
                }
            };
            reader.readAsText(file);
        }

        // 事件监听
        btnSave.addEventListener('click', saveData);
        btnDelete.addEventListener('click', deleteData);

        document.addEventListener('keydown', ev => {
            if (ev.key === 'Escape' && viewEdit.classList.contains('active')) {
                switchView('list');
            }
        });

        // 初始化渲染
        renderCards();
    </script>
</body>
</html>
