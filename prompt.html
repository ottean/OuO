<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百变Zo登场</title>
    <style>
        /* 基础与字体，采用仿iOS字体 */
        :root {
            --text-color: #5c627a;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(144, 153, 190, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f7f9fc;
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景液态模糊色块 */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.7;
            animation: float 15s ease-in-out infinite alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #e0c3fc; }
        .blob-2 { bottom: -10%; right: -10%; width: 60vw; height: 60vw; background: #c2e9fb; }
        .blob-3 { top: 40%; left: 30%; width: 40vw; height: 40vw; background: #ffd1ff; animation-delay: -5s;}

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        /* 容器 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 头部与返回键 */
        header {
            margin-bottom: 30px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 999px;
            color: #6a7495;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(144, 153, 190, 0.1);
            margin-bottom: 20px;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateX(-4px);
            color: #5c627a;
        }

        header h1 {
            font-weight: 600;
            font-size: 28px;
            letter-spacing: 1px;
            color: #6a7495;
            text-align: center;
        }

        /* 工具栏：统计 + 导入导出 */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 5px;
        }

        .count-text {
            font-size: 14px;
            color: #9ba4c4;
        }
        .count-text strong {
            color: #7983a8;
            font-weight: 600;
        }

        .actions-right {
            display: flex;
            gap: 10px;
        }

        .btn-tool {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 999px;
            color: #6a7495;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
        }

        .btn-tool:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(144, 153, 190, 0.15);
        }

        /* 玻璃态通用类 */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
        }

        /* 卡片网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        /* 卡片样式更新 */
        .card {
            height: 120px;
            display: flex;
            align-items: center;      /* 完美垂直居中 */
            justify-content: center;  /* 完美水平居中 */
            position: relative;       /* 为底部字数提供定位基准 */
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: center;
            padding: 15px;
            word-break: break-word;
            line-height: 1.4;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 40px 0 rgba(144, 153, 190, 0.25);
        }

        /* 备注名：20px */
        .card-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-color);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            /* 给底部预留一点空间，防止两行文字时和字数重叠 */
            margin-bottom: 8px; 
        }

        /* 字数：8px，且绝对定位在下面中心 */
        .card-count {
            font-size: 8px;
            color: #9ba4c4;
            font-family: "DM Mono", monospace, sans-serif;
            background: rgba(255, 255, 255, 0.4);
            padding: 2px 6px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap; /* 强制不换行 */
        }

        /* 添加按钮卡片 */
        .add-card {
            font-size: 36px;
            color: #9ba4c4;
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.7);
        }

        .add-card:hover {
            color: #7983a8;
            background: rgba(255, 255, 255, 0.4);
        }

        /* 弹窗遮罩 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(230, 235, 245, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        /* 弹窗内容 */
        .modal-content {
            width: 90%;
            max-width: 600px;
            padding: 30px;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        /* 文本框基础样式 */
        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            padding: 15px;
            font-size: 16px;
            color: var(--text-color);
            outline: none;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 5px rgba(144, 153, 190, 0.05);
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 3px rgba(194, 233, 251, 0.5);
        }

        /* 💡 文本域包裹层：解决移动端拖拽角被覆盖的问题 */
        .textarea-wrapper {
            width: 100%;
            min-height: 250px;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            box-shadow: inset 0 2px 5px rgba(144, 153, 190, 0.05);
            /* 将伸缩功能交给包裹层 */
            resize: vertical;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }

        .textarea-wrapper:focus-within {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 3px rgba(194, 233, 251, 0.5);
        }

        /* 内部真正的文本域 */
        textarea {
            flex: 1; /* 撑满包裹层 */
            width: 100%;
            background: transparent;
            border: none;
            resize: none; /* 禁用原生的伸缩，因为父级在伸缩 */
            outline: none;
            padding: 15px;
            /* 预留右下角的边距，避开父级的拖拽热区 */
            padding-right: 20px;
            padding-bottom: 20px;
            font-size: 15px;
            color: var(--text-color);
            line-height: 1.6;
        }

        input::placeholder, textarea::placeholder {
            color: #b0b6cf;
        }

        /* 按钮区域 */
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 10px;
        }

        .modal-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #fff;
        }

        .btn-cancel { background: #d3d8e8; color: #6a7495; }
        .btn-delete { background: #ffb6c1; margin-right: auto; }
        .btn-save   { background: #a1c4fd; }

        .modal-btn:hover { filter: brightness(0.95); transform: scale(1.05); }
        .modal-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="container">
        <header>
            <a href="index.html" class="back-link">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                返回Zo的百宝箱
            </a>
            <h1>人设管理器</h1>
        </header>

        <!-- 工具栏：统计与导入导出 -->
        <div class="toolbar">
            <div class="count-text">共 <strong id="prompt-count">0</strong> 个人设卡片</div>
            
            <div class="actions-right">
                <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(event)">
                <button class="btn-tool" onclick="document.getElementById('import-file').click()">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 12V4m0 0L5 7m3-3l3 3M2 14h12"/></svg>
                    导入
                </button>
                <button class="btn-tool" onclick="exportData()">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 4v8m0 0l-3-3m3 3l3-3M2 14h12"/></svg>
                    导出
                </button>
            </div>
        </div>

        <div class="grid" id="card-container">
            <!-- 卡片将通过 JS 动态生成 -->
        </div>
    </div>

    <!-- 编辑/添加弹窗 -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content glass">
            <input type="text" id="input-remark" placeholder="输入人物备注 (如：傲娇小猫)">
            
            <!-- 加入包裹层 -->
            <div class="textarea-wrapper">
                <textarea id="input-prompt" placeholder="在这里粘贴完整的 Prompt 人设设定..."></textarea>
            </div>
            
            <div class="actions">
                <button class="modal-btn btn-delete" id="btn-delete" style="display: none;">删除</button>
                <button class="modal-btn btn-cancel" id="btn-cancel">取消</button>
                <button class="modal-btn btn-save" id="btn-save">保存</button>
            </div>
        </div>
    </div>

    <script>
        let characters = JSON.parse(localStorage.getItem('prompts_data')) || [];
        let currentEditId = null;

        const container = document.getElementById('card-container');
        const countText = document.getElementById('prompt-count');
        const modal = document.getElementById('modal');
        const inputRemark = document.getElementById('input-remark');
        const inputPrompt = document.getElementById('input-prompt');
        const btnSave = document.getElementById('btn-save');
        const btnCancel = document.getElementById('btn-cancel');
        const btnDelete = document.getElementById('btn-delete');

        // 计算字符数（去空白符）
        function getCharCount(text) {
            if (!text) return 0;
            return text.replace(/\s+/g, '').length;
        }

        // 渲染主页卡片
        function renderCards() {
            container.innerHTML = ''; 
            countText.textContent = characters.length; 

            // 渲染已有角色卡片
            characters.forEach(char => {
                const card = document.createElement('div');
                card.className = 'card glass';
                card.onclick = () => openModal(char.id);

                // 创建名字行
                const nameDiv = document.createElement('div');
                nameDiv.className = 'card-name';
                nameDiv.textContent = char.remark;

                // 创建字数行
                const charCount = getCharCount(char.prompt);
                const countDiv = document.createElement('div');
                countDiv.className = 'card-count';
                countDiv.textContent = charCount + ' 字符';

                card.appendChild(nameDiv);
                card.appendChild(countDiv);
                
                container.appendChild(card);
            });

            // 渲染“添加”按钮卡片
            const addCard = document.createElement('div');
            addCard.className = 'card glass add-card';
            addCard.textContent = '+';
            addCard.onclick = () => openModal(null);
            container.appendChild(addCard);
        }

        // 打开弹窗
        function openModal(id) {
            currentEditId = id;
            if (id) {
                const char = characters.find(c => c.id === id);
                inputRemark.value = char.remark;
                inputPrompt.value = char.prompt;
                btnDelete.style.display = 'block';
            } else {
                inputRemark.value = '';
                inputPrompt.value = '';
                btnDelete.style.display = 'none';
            }
            modal.classList.add('active');
            setTimeout(() => inputRemark.focus(), 100);
        }

        // 关闭弹窗
        function closeModal() {
            modal.classList.remove('active');
            currentEditId = null;
        }

        // 保存数据
        function saveData() {
            const remarkText = inputRemark.value.trim();
            const promptText = inputPrompt.value.trim();

            if (!remarkText) {
                alert('请填写人物备注噢～');
                return;
            }

            if (currentEditId) {
                const index = characters.findIndex(c => c.id === currentEditId);
                if (index !== -1) {
                    characters[index].remark = remarkText;
                    characters[index].prompt = promptText;
                }
            } else {
                characters.push({
                    id: Date.now().toString(),
                    remark: remarkText,
                    prompt: promptText
                });
            }

            localStorage.setItem('prompts_data', JSON.stringify(characters));
            renderCards();
            closeModal();
        }

        // 删除数据
        function deleteData() {
            if(confirm('确定要删除这个设定吗？')) {
                characters = characters.filter(c => c.id !== currentEditId);
                localStorage.setItem('prompts_data', JSON.stringify(characters));
                renderCards();
                closeModal();
            }
        }

        // 导出 JSON
        function exportData() {
            if (characters.length === 0) return alert('当前没有人设可以导出 🫧');
            
            const dataStr = JSON.stringify(characters, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `Prompt_Backup_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 导入 JSON
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (!Array.isArray(importedData)) throw new Error('格式不正确');
                    
                    const confirmMsg = `成功读取 ${importedData.length} 个人设卡片。\n\n点击【确定】覆盖当前所有数据\n点击【取消】将新数据追加到列表里`;
                    
                    if (confirm(confirmMsg)) {
                        characters = importedData; 
                    } else {
                        const existingIds = new Set(characters.map(item => item.id));
                        const newEntries = importedData.filter(item => !existingIds.has(item.id));
                        characters = [...newEntries, ...characters];
                    }
                    
                    localStorage.setItem('prompts_data', JSON.stringify(characters));
                    renderCards();
                    alert('导入成功！✨');
                } catch (err) {
                    alert('导入失败：文件格式不正确或已损坏。请确保是之前导出的人设 JSON 文件。');
                } finally {
                    event.target.value = ''; 
                }
            };
            reader.readAsText(file);
        }

        // 事件监听
        btnSave.addEventListener('click', saveData);
        btnCancel.addEventListener('click', closeModal);
        btnDelete.addEventListener('click', deleteData);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        // 快捷键支持
        document.addEventListener('keydown', ev => {
            if (ev.key === 'Escape' && modal.classList.contains('active')) closeModal();
        });

        // 初始化渲染
        renderCards();
    </script>
</body>
</html>
